<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: Arial; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #f5f5f5; }

  .toolbar {
    padding: 8px 12px;
    border-bottom: 1px solid #ccc;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    background: #fff;
    align-items: center;
  }

  .toolbar-group {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .divider {
    width: 1px;
    height: 28px;
    background: #ccc;
    margin: 0 4px;
  }

  .container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .editor-pane {
    width: 50%;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #ccc;
  }

  .editor-toolbar {
    padding: 6px 10px;
    background: #fafafa;
    border-bottom: 1px solid #eee;
    display: flex;
    gap: 6px;
  }

  textarea {
    flex: 1;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
    border: none;
    outline: none;
    resize: none;
    background: #fff;
  }

  .preview-pane {
    width: 50%;
    display: flex;
    flex-direction: column;
    background: #fff;
  }

  .preview-toolbar {
    padding: 6px 10px;
    background: #fafafa;
    border-bottom: 1px solid #eee;
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .zoom-label {
    font-size: 13px;
    color: #555;
    min-width: 42px;
    text-align: center;
  }

  #preview {
    flex: 1;
    overflow: auto; /* scroll ทั้งแนวตั้งและแนวนอน */
    padding: 20px;
    cursor: grab;
    position: relative;
  }

  #preview:active { cursor: grabbing; }

  #preview-inner {
    display: inline-block;
    transform-origin: top left;
    transition: transform 0.15s ease;
  }

  button {
    padding: 5px 11px;
    cursor: pointer;
    border: 1px solid #bbb;
    background: #fff;
    border-radius: 4px;
    font-size: 13px;
    white-space: nowrap;
  }

  button:hover { background: #f0f0f0; }
  button.danger { border-color: #e88; color: #c33; }
  button.danger:hover { background: #fff0f0; }

  @media (max-width: 768px) {
    .container { flex-direction: column; }
    .editor-pane, .preview-pane { width: 100%; height: 50%; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-group">
    <button onclick="copyPNG()">📋 Copy PNG</button>
    <button onclick="downloadPNG()">⬇️ Download PNG</button>
  </div>
</div>

<div class="container">

  <!-- Editor -->
  <div class="editor-pane">
    <div class="editor-toolbar">
      <button onclick="pasteText()">📥 Paste</button>
      <button class="danger" onclick="clearText()">🗑️ ล้าง</button>
    </div>
    <textarea id="code">graph TD
A[Start] --> B[Process] --> C[End]</textarea>
  </div>

  <!-- Preview -->
  <div class="preview-pane">
    <div class="preview-toolbar">
      <button onclick="zoomIn()">🔍＋</button>
      <button onclick="zoomOut()">🔍－</button>
      <button onclick="resetZoom()">↺ Reset</button>
      <span class="zoom-label" id="zoomLabel">100%</span>
    </div>
    <div id="preview">
      <div id="preview-inner"></div>
    </div>
  </div>

</div>

<script>
mermaid.initialize({ startOnLoad: false, theme: 'default' });

const textarea = document.getElementById("code");
const previewInner = document.getElementById("preview-inner");
const previewEl = document.getElementById("preview");
const zoomLabel = document.getElementById("zoomLabel");

let currentSVG = "";
let zoomLevel = 1;
const ZOOM_STEP = 0.15;
const ZOOM_MIN = 0.2;
const ZOOM_MAX = 4;

// ── Render ──────────────────────────────────────────
async function renderMermaid() {
  try {
    const { svg } = await mermaid.render("graphDiv", textarea.value.trim());
    previewInner.innerHTML = svg;
    currentSVG = svg;
  } catch (err) {
    previewInner.innerHTML = "<pre style='color:red'>" + err + "</pre>";
    currentSVG = "";
  }
}

textarea.addEventListener("input", renderMermaid);
renderMermaid();

// ── Editor buttons ───────────────────────────────────
function clearText() {
  if (textarea.value && !confirm("ล้าง input ทั้งหมด?")) return;
  textarea.value = "";
  previewInner.innerHTML = "";
  currentSVG = "";
}

async function pasteText() {
  try {
    const text = await navigator.clipboard.readText();
    textarea.value = text;
    renderMermaid();
  } catch (err) {
    alert("ไม่สามารถ Paste ได้: " + err);
  }
}

// ── Zoom ─────────────────────────────────────────────
function applyZoom() {
  previewInner.style.transform = `scale(${zoomLevel})`;
  zoomLabel.textContent = Math.round(zoomLevel * 100) + "%";
}

function zoomIn() {
  zoomLevel = Math.min(ZOOM_MAX, +(zoomLevel + ZOOM_STEP).toFixed(2));
  applyZoom();
}

function zoomOut() {
  zoomLevel = Math.max(ZOOM_MIN, +(zoomLevel - ZOOM_STEP).toFixed(2));
  applyZoom();
}

function resetZoom() {
  zoomLevel = 1;
  applyZoom();
}

// Ctrl+Scroll to zoom
previewEl.addEventListener("wheel", (e) => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    e.deltaY < 0 ? zoomIn() : zoomOut();
  }
}, { passive: false });

// ── SVG → PNG ────────────────────────────────────────
function svgToPngBlob(svgText) {
  return new Promise((resolve, reject) => {
    const svgEl = previewInner.querySelector("svg");
    if (!svgEl) return reject("ไม่พบ SVG element");

    const rect = svgEl.getBoundingClientRect();
    let w = rect.width / zoomLevel;   // ขนาดจริง ไม่รวม zoom
    let h = rect.height / zoomLevel;

    if (!w || !h) {
      const vb = svgEl.getAttribute("viewBox");
      if (vb) {
        const parts = vb.split(/[\s,]+/);
        w = parseFloat(parts[2]) || 800;
        h = parseFloat(parts[3]) || 600;
      } else { w = 800; h = 600; }
    }

    const clone = svgEl.cloneNode(true);
    clone.setAttribute("width", w);
    clone.setAttribute("height", h);
    clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");

    const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    bg.setAttribute("width", "100%");
    bg.setAttribute("height", "100%");
    bg.setAttribute("fill", "white");
    clone.insertBefore(bg, clone.firstChild);

    const svgStr = new XMLSerializer().serializeToString(clone);
    const svgBase64 = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgStr)));

    const img = new Image();
    img.onload = function () {
      const scale = 2;
      const canvas = document.createElement("canvas");
      canvas.width = w * scale;
      canvas.height = h * scale;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "white";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.scale(scale, scale);
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob((blob) => {
        if (blob) resolve(blob);
        else reject("PNG blob error");
      }, "image/png");
    };
    img.onerror = (e) => reject("Image load error: " + e);
    img.src = svgBase64;
  });
}

// ── Copy / Download ──────────────────────────────────
async function copyPNG() {
  if (!currentSVG) return alert("ยังไม่มี diagram");
  try {
    const blob = await svgToPngBlob(currentSVG);
    if (!navigator.clipboard || !window.ClipboardItem) {
      alert("Browser ไม่รองรับ Copy → Download แทน");
      return downloadPNG();
    }
    await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
    alert("✅ Copied PNG!");
  } catch (err) {
    alert("Copy ไม่ได้ → Download แทน\n" + err);
    downloadPNG();
  }
}

async function downloadPNG() {
  if (!currentSVG) return alert("ยังไม่มี diagram");
  try {
    const blob = await svgToPngBlob(currentSVG);
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "diagram.png";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch (err) {
    alert("Download failed: " + err);
  }
}
</script>
</body>
</html>
