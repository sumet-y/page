<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

<style>
  body {
    font-family: Arial;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .toolbar {
    padding: 10px;
    border-bottom: 1px solid #ccc;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .container {
    display: flex;
    flex: 1;
  }

  textarea {
    width: 50%;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
    border: none;
    outline: none;
  }

  #preview {
    width: 50%;
    padding: 10px;
    overflow: auto;
    border-left: 1px solid #ccc;
  }

  button {
    padding: 6px 12px;
    cursor: pointer;
  }

  /* 📱 Mobile */
  @media (max-width: 768px) {
    .container {
      flex-direction: column;
    }
    textarea, #preview {
      width: 100%;
      height: 50%;
    }
  }
</style>
</head>

<body>

<div class="toolbar">
  <button onclick="copyJPG()">📋 Copy JPG</button>
  <button onclick="downloadJPG()">⬇️ Download JPG</button>
</div>

<div class="container">
  <textarea id="code">
graph TD
A[Start] --> B[End]
  </textarea>

  <div id="preview"></div>
</div>

<script>
mermaid.initialize({ startOnLoad: false });

const textarea = document.getElementById("code");
const preview = document.getElementById("preview");

let currentSVG = "";

async function renderMermaid() {
  try {
    const { svg } = await mermaid.render("graphDiv", textarea.value);
    preview.innerHTML = svg;
    currentSVG = svg;
  } catch (err) {
    preview.innerHTML = "<pre style='color:red'>" + err + "</pre>";
  }
}

textarea.addEventListener("input", renderMermaid);
renderMermaid();


// 🔄 SVG → JPG
function svgToJpgBlob(svgText) {
  return new Promise((resolve) => {
    const img = new Image();
    const svgBlob = new Blob([svgText], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(svgBlob);

    img.onload = function () {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;

      const ctx = canvas.getContext("2d");

      // ✅ พื้นหลังขาว (JPG ไม่มี transparency)
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);

      canvas.toBlob((blob) => {
        resolve(blob);
      }, "image/jpeg", 0.95);
    };

    img.src = url;
  });
}


// 📋 Copy JPG
async function copyJPG() {
  if (!currentSVG) return;

  try {
    const blob = await svgToJpgBlob(currentSVG);

    await navigator.clipboard.write([
      new ClipboardItem({ "image/jpeg": blob })
    ]);

    alert("Copied as JPG!");
  } catch (err) {
    alert("Copy JPG failed (browser อาจไม่รองรับ)");
  }
}


// ⬇️ Download JPG
async function downloadJPG() {
  if (!currentSVG) return;

  const blob = await svgToJpgBlob(currentSVG);
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "diagram.jpg";
  a.click();

  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
