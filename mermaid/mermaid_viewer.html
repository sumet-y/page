<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mermaid Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

<style>
  body {
    font-family: Arial;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .toolbar {
    padding: 10px;
    border-bottom: 1px solid #ccc;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .container {
    display: flex;
    flex: 1;
  }

  textarea {
    width: 50%;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
    border: none;
    outline: none;
  }

  #preview {
    width: 50%;
    padding: 10px;
    overflow: auto;
    border-left: 1px solid #ccc;
  }

  button {
    padding: 6px 12px;
    cursor: pointer;
  }

  /* 📱 Mobile */
  @media (max-width: 768px) {
    .container {
      flex-direction: column;
    }
    textarea, #preview {
      width: 100%;
      height: 50%;
    }
  }
</style>
</head>

<body>

<div class="toolbar">
  <button onclick="copyPNG()">📋 Copy PNG</button>
  <button onclick="downloadPNG()">⬇️ Download PNG</button>
</div>

<div class="container">
  <textarea id="code">
graph TD
A[Start] --> B[End]
  </textarea>

  <div id="preview"></div>
</div>

<script>
mermaid.initialize({ startOnLoad: false });

const textarea = document.getElementById("code");
const preview = document.getElementById("preview");

let currentSVG = "";

async function renderMermaid() {
  try {
    const { svg } = await mermaid.render("graphDiv", textarea.value);
    preview.innerHTML = svg;
    currentSVG = svg;
  } catch (err) {
    preview.innerHTML = "<pre style='color:red'>" + err + "</pre>";
  }
}

textarea.addEventListener("input", renderMermaid);
renderMermaid();


// 🔄 SVG → PNG (แก้ CORS แล้ว)
function svgToPngBlob(svgText) {
  return new Promise((resolve, reject) => {
    const img = new Image();

    const svgBase64 = "data:image/svg+xml;base64," +
      btoa(unescape(encodeURIComponent(svgText)));

    img.onload = function () {
      const scale = 2; // เพิ่มความคม
      const canvas = document.createElement("canvas");

      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.scale(scale, scale);

      // PNG โปร่งใสได้ (ไม่ต้อง fill ขาว)
      ctx.drawImage(img, 0, 0);

      canvas.toBlob((blob) => {
        if (blob) resolve(blob);
        else reject("PNG error");
      }, "image/png");
    };

    img.onerror = reject;
    img.src = svgBase64;
  });
}


// 📋 Copy PNG
async function copyPNG() {
  try {
    const blob = await svgToPngBlob(currentSVG);

    if (!navigator.clipboard || !window.ClipboardItem) {
      alert("Browser ไม่รองรับ → Download แทน");
      downloadPNG();
      return;
    }

    await navigator.clipboard.write([
      new ClipboardItem({ "image/png": blob })
    ]);

    alert("Copied PNG!");
  } catch (err) {
    alert("Copy ไม่ได้ → Download แทน");
    downloadPNG();
  }
}


// ⬇️ Download PNG
async function downloadPNG() {
  try {
    const blob = await svgToPngBlob(currentSVG);

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "diagram.png";
    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);

  } catch (err) {
    alert("Download failed: " + err);
  }
}
</script>

</body>
</html>
