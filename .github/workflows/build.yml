name: Build WASM Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        working-directory: ./checker
        run: wasm-pack build --target web --out-dir pkg --release

      - name: Copy WASM files to checker folder
        run: |
          cp checker/pkg/thai_checkers_engine_bg.wasm checker/thai_checkers_engine_bg.wasm
          cp checker/pkg/thai_checkers_engine.js checker/thai_checkers_engine.js

      - name: Commit WASM files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add checker/thai_checkers_engine_bg.wasm checker/thai_checkers_engine.js
          git diff --staged --quiet || git commit -m "Auto-build WASM engine"
          git pull --rebase origin main
          git push

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
