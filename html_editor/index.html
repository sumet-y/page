<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pro HTML Editor - Fixed Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  /* ให้ body เลื่อนได้อิสระตามความยาว Preview */
  body { 
    background: #1a1a1a; 
    font-family: -apple-system, sans-serif; 
    overflow-y: auto; 
    min-height: 100vh;
  }

  /* Toolbar & Search ติดหนึบด้านบน */
  .header-sticky {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #1a1a1a;
  }

  .toolbar {
    display: flex; align-items: center; gap: 6px; padding: 10px;
    background: #111; border-bottom: 1px solid #333;
  }
  .btn {
    padding: 8px 12px; border-radius: 6px; border: 1px solid #444;
    background: #222; color: #eee; cursor: pointer; font-size: 12px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-run { background: #f59e0b; color: #000; font-weight: bold; border: none; }

  .search-bar {
    display: none; background: #222; padding: 8px; gap: 8px;
    border-bottom: 1px solid #333; align-items: center;
  }
  .search-bar.open { display: flex; }
  .search-bar input {
    flex: 1; background: #111; border: 1px solid #444; color: #fff;
    padding: 6px; border-radius: 4px; outline: none; font-size: 14px;
  }

  /* Editor Zone: ล็อกความสูง 50% ของหน้าจอ */
  .editor-container {
    height: 50vh;
    display: flex; background: #161616;
    position: relative; overflow: hidden;
    border-bottom: 2px solid #f59e0b;
  }

  .line-numbers {
    width: 40px; background: #111; color: #444; padding: 10px 0;
    text-align: right; font-family: monospace; font-size: 14px;
    line-height: 1.5; border-right: 1px solid #222; overflow: hidden;
  }
  .line-numbers span { display: block; padding-right: 5px; }
  .line-numbers .match-line { color: #f59e0b; background: rgba(245, 158, 11, 0.2); }

  .code-viewport { flex: 1; position: relative; overflow: auto; }

  .backdrop, #code-input {
    width: fit-content; min-width: 100%;
    height: 100%; min-height: 100%;
    padding: 10px; font-family: monospace;
    font-size: 14px; line-height: 1.5;
    white-space: pre; word-wrap: normal;
  }
  .backdrop { position: absolute; top: 0; left: 0; color: transparent; z-index: 1; pointer-events: none; }
  #code-input { background: transparent; color: #e8e8e8; border: none; outline: none; resize: none; position: relative; z-index: 2; }

  mark { background: rgba(245, 158, 11, 0.4); color: transparent; }
  mark.current { background: #f59e0b; color: #000; }

  /* Preview Zone: ส่วนสำคัญที่แก้ไข */
  .preview-section {
    width: 100%;
    background: #fff;
    position: relative;
  }
  .preview-label { 
    background: #333; color: #fff; padding: 6px 12px; 
    font-size: 11px; font-weight: bold; letter-spacing: 1px;
  }
  
  /* iframe ต้องไม่เลื่อนเอง แต่ให้ยืดตามเนื้อหา */
  #preview-frame {
    width: 100%;
    border: none;
    display: block;
    overflow: hidden; /* ปิด scroll ของ iframe */
    pointer-events: auto; /* ให้กดปุ่มข้างในได้ */
  }

  .status { font-size: 10px; padding: 6px 10px; background: #111; color: #555; }
</style>
</head>
<body>

<div class="header-sticky">
  <div class="toolbar">
    <button class="btn" onclick="clearCode()">ล้าง</button>
    <button class="btn" onclick="pasteCode()">วาง</button>
    <button class="btn" onclick="copyCode()">คัดลอก</button>
    <button class="btn" onclick="toggleSearch()">⌕ ค้นหา</button>
    <button class="btn btn-run" onclick="runCode()">▶ รันโค้ด</button>
  </div>

  <div class="search-bar" id="searchBar">
    <input type="text" id="searchInput" placeholder="ค้นหา..." oninput="doSearch()">
    <button class="btn" onclick="prevMatch()">↑</button>
    <button class="btn" onclick="nextMatch()">↓</button>
    <span id="searchCount" style="color:#888; font-size:12px;">0/0</span>
  </div>
</div>

<div class="editor-container">
  <div class="line-numbers" id="lineNumbers"></div>
  <div class="code-viewport" id="viewport" onscroll="syncScroll()">
    <div class="backdrop" id="backdrop"></div>
    <textarea id="code-input" spellcheck="false" oninput="onInput()" wrap="off"></textarea>
  </div>
</div>

<div class="preview-section">
  <div class="preview-label">LIVE PREVIEW</div>
  <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
</div>

<div class="status" id="statusBar">บรรทัด: 1</div>

<script>
  const input = document.getElementById('code-input');
  const backdrop = document.getElementById('backdrop');
  const lineNumbers = document.getElementById('lineNumbers');
  const viewport = document.getElementById('viewport');
  const preview = document.getElementById('preview-frame');
  const searchInput = document.getElementById('searchInput');

  let matches = [];
  let currentMatchIdx = 0;

  // --- ส่วนของ Editor ---
  function onInput() {
    updateLineNumbers();
    doSearch();
    updateStatus();
  }

  function updateLineNumbers() {
    const lines = input.value.split('\n');
    const q = searchInput.value.toLowerCase();
    lineNumbers.innerHTML = lines.map((line, i) => {
      const isMatch = q && line.toLowerCase().includes(q);
      return `<span class="${isMatch ? 'match-line' : ''}">${i + 1}</span>`;
    }).join('');
  }

  function syncScroll() {
    lineNumbers.scrollTop = viewport.scrollTop;
  }

  // --- ส่วนของระบบค้นหา (Scroll into view) ---
  function toggleSearch() {
    const bar = document.getElementById('searchBar');
    bar.classList.toggle('open');
    if(bar.classList.contains('open')) searchInput.focus();
    else { searchInput.value = ''; doSearch(); }
  }

  function doSearch() {
    const q = searchInput.value;
    const text = input.value;
    matches = [];
    if (!q) {
      backdrop.innerHTML = escapeHTML(text);
      document.getElementById('searchCount').innerText = "0/0";
      updateLineNumbers();
      return;
    }
    const regex = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    backdrop.innerHTML = escapeHTML(text).replace(regex, (m, idx) => {
      matches.push(idx);
      return `<mark>${m}</mark>`;
    });
    const allMarks = backdrop.querySelectorAll('mark');
    if (allMarks.length > 0) {
      allMarks[currentMatchIdx]?.classList.add('current');
      document.getElementById('searchCount').innerText = `${currentMatchIdx + 1}/${allMarks.length}`;
      scrollToMark(allMarks[currentMatchIdx]);
    }
    updateLineNumbers();
  }

  function scrollToMark(el) {
    if (!el) return;
    viewport.scrollTo({
      top: el.offsetTop - (viewport.clientHeight / 2),
      left: el.offsetLeft - (viewport.clientWidth / 2),
      behavior: 'smooth'
    });
  }

  function nextMatch() { if(matches.length) { currentMatchIdx = (currentMatchIdx + 1) % matches.length; doSearch(); } }
  function prevMatch() { if(matches.length) { currentMatchIdx = (currentMatchIdx - 1 + matches.length) % matches.length; doSearch(); } }

  // --- ส่วนของ Preview (จุดที่แก้ไขหลัก) ---
  function runCode() {
    const doc = preview.contentDocument || preview.contentWindow.document;
    doc.open();
    doc.write(input.value);
    doc.close();

    // รอให้เนื้อหาโหลดเสร็จแล้วคำนวณความสูง
    preview.onload = resizePreview;
    setTimeout(resizePreview, 100); 
  }

  function resizePreview() {
    const doc = preview.contentDocument || preview.contentWindow.document;
    if (doc && doc.body) {
      // ทำให้ iframe สูงเท่าเนื้อหาจริงๆ
      const height = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight);
      preview.style.height = (height + 20) + 'px'; 
    }
  }

  // ใช้ MutationObserver เพื่อให้ iframe ยืดตามเนื้อหาอัตโนมัติแม้มีการรัน JS ภายใน
  const observer = new MutationObserver(resizePreview);
  preview.addEventListener('load', () => {
    const doc = preview.contentDocument || preview.contentWindow.document;
    observer.observe(doc.body, { attributes: true, childList: true, subtree: true });
  });

  // --- Helper Functions ---
  function clearCode() { input.value = ''; onInput(); runCode(); }
  function copyCode() { navigator.clipboard.writeText(input.value); alert("คัดลอกแล้ว"); }
  async function pasteCode() {
    try {
      const t = await navigator.clipboard.readText();
      const s = input.selectionStart;
      input.value = input.value.slice(0, s) + t + input.value.slice(input.selectionEnd);
      onInput();
    } catch(e) { alert("กรุณากดวางด้วยตัวเอง"); }
  }

  function updateStatus() {
    document.getElementById('statusBar').innerText = `บรรทัด: ${input.value.split('\n').length}`;
  }

  function escapeHTML(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // Initial
  input.value = "<h1>สวัสดี</h1>\n<button onclick='alert(\"ทำงานได้!\")'>ลองกดปุ่มนี้</button>\n<p style='height:1000px; background:linear-gradient(to bottom, #eee, #333); color:#fff; padding:20px;'>\nเนื้อหาที่มีความยาวมากๆ เพื่อทดสอบการยืดของหน้าจอ\n</p>";
  onInput();
  runCode();
</script>

</body>
</html>
