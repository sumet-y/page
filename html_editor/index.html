
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .app { display: flex; flex-direction: column; height: 100vh; min-height: 500px; }
  .toolbar {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
  }
  .toolbar-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
  .btn {
    font-size: 12px; padding: 5px 12px; border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary); background: transparent;
    color: var(--color-text-primary); cursor: pointer; transition: background 0.15s;
    font-family: var(--font-sans);
  }
  .btn:hover { background: var(--color-background-secondary); }
  .btn:active { transform: scale(0.98); }
  .btn-run {
    background: var(--color-text-primary); color: var(--color-background-primary);
    border-color: transparent; font-weight: 500;
  }
  .btn-run:hover { opacity: 0.85; }
  .main { display: flex; flex: 1; overflow: hidden; }
  .editor-pane { display: flex; flex-direction: column; flex: 1; border-right: 0.5px solid var(--color-border-tertiary); }
  .pane-label {
    font-size: 11px; color: var(--color-text-secondary); padding: 6px 14px;
    background: var(--color-background-secondary); border-bottom: 0.5px solid var(--color-border-tertiary);
    letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500;
  }
  #code-input {
    flex: 1; width: 100%; border: none; outline: none; resize: none;
    padding: 14px; font-family: var(--font-mono); font-size: 13px; line-height: 1.65;
    background: var(--color-background-primary); color: var(--color-text-primary);
    tab-size: 2;
  }
  .preview-pane { display: flex; flex-direction: column; flex: 1; }
  #preview-frame { flex: 1; border: none; background: white; }
  .status-bar {
    font-size: 11px; color: var(--color-text-secondary); padding: 5px 14px;
    border-top: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-secondary);
    display: flex; justify-content: space-between; align-items: center;
  }
  .badge {
    font-size: 10px; padding: 2px 7px; border-radius: 99px;
    background: var(--color-background-info); color: var(--color-text-info);
    font-weight: 500;
  }
</style>

<div class="app">
  <div class="toolbar">
    <span class="toolbar-title">HTML Editor</span>
    <button class="btn" onclick="clearCode()">ล้าง</button>
    <button class="btn" onclick="copyCode()">คัดลอก</button>
    <button class="btn btn-run" onclick="runCode()">▶ รัน</button>
  </div>
  <div class="main">
    <div class="editor-pane">
      <div class="pane-label">Code</div>
      <textarea id="code-input" spellcheck="false" placeholder="วาง HTML ของคุณที่นี่..."></textarea>
    </div>
    <div class="preview-pane">
      <div class="pane-label">Preview</div>
      <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
    </div>
  </div>
  <div class="status-bar">
    <span id="char-count">0 ตัวอักษร</span>
    <span class="badge" id="status-badge">พร้อมใช้งาน</span>
  </div>
</div>

<script>
  const input = document.getElementById('code-input');
  const frame = document.getElementById('preview-frame');
  const charCount = document.getElementById('char-count');
  const statusBadge = document.getElementById('status-badge');

  const defaultCode = `<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>หน้าทดสอบ</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    h1 { color: #333; }
  </style>
</head>
<body>
  <h1>สวัสดี โลก!</h1>
</body>
</html>`;

  input.value = defaultCode;
  updateCount();
  runCode();

  input.addEventListener('input', updateCount);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = input.selectionStart;
      input.value = input.value.slice(0, s) + '  ' + input.value.slice(input.selectionEnd);
      input.selectionStart = input.selectionEnd = s + 2;
    }
  });

  function runCode() {
    const code = input.value.trim();
    if (!code) return;
    try {
      const doc = frame.contentDocument || frame.contentWindow.document;
      doc.open(); doc.write(code); doc.close();
      statusBadge.textContent = 'แสดงผลสำเร็จ';
      statusBadge.style.background = 'var(--color-background-success)';
      statusBadge.style.color = 'var(--color-text-success)';
    } catch(e) {
      statusBadge.textContent = 'เกิดข้อผิดพลาด';
      statusBadge.style.background = 'var(--color-background-danger)';
      statusBadge.style.color = 'var(--color-text-danger)';
    }
  }

  function clearCode() {
    input.value = '';
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open(); doc.write(''); doc.close();
    updateCount();
    statusBadge.textContent = 'พร้อมใช้งาน';
    statusBadge.style.background = '';
    statusBadge.style.color = '';
  }

  function copyCode() {
    navigator.clipboard.writeText(input.value).then(() => {
      statusBadge.textContent = 'คัดลอกแล้ว!';
      statusBadge.style.background = 'var(--color-background-info)';
      statusBadge.style.color = 'var(--color-text-info)';
      setTimeout(() => {
        statusBadge.textContent = 'พร้อมใช้งาน';
        statusBadge.style.background = '';
        statusBadge.style.color = '';
      }, 2000);
    });
  }

  function updateCount() {
    charCount.textContent = input.value.length.toLocaleString() + ' ตัวอักษร';
  }
</script>
