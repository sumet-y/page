<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Thai Checkers Trainer</title>

<style>
body{
font-family:Arial;
text-align:center;
}

.board{
display:grid;
grid-template-columns:repeat(8,60px);
grid-template-rows:repeat(8,60px);
width:480px;
margin:auto;
margin-bottom:20px;
}

.square{
width:60px;
height:60px;
position:relative;
cursor:pointer;
}

.light{background:#f0d9b5;}
.dark{background:#b58863;}

.num{
position:absolute;
top:3px;
right:5px;
font-size:11px;
font-weight:bold;
}

.piece{
width:40px;
height:40px;
border-radius:50%;
margin:auto;
margin-top:10px;
position:relative;
pointer-events:none;
}

.white{
background:white;
border:2px solid #444;
}

.black{
background:black;
}

.king::after{
content:"";
position:absolute;
width:24px;
height:24px;
border-radius:50%;
top:8px;
left:8px;
background:gold;
}

.selected{
outline:3px solid yellow;
}

button{
padding:8px 16px;
margin:5px;
font-size:16px;
border-radius:6px;
border:none;
background:#444;
color:white;
cursor:pointer;
}

button:hover{
background:#666;
}
</style>
</head>

<body>

<h2>Checkers Viewer</h2>
<div id="bookBoard" class="board"></div>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<p id="moveInfo"></p>

<hr>

<h2>Training Board</h2>
<div id="trainBoard" class="board"></div>
<button onclick="resetTrainer()">Reset</button>
<p id="status"></p>

<script>

let step=0;

let data={
start:{
white:[1,2,3,4,5,6,7,8],
black:[25,26,27,28,29,30,31,32]
},
moves:[
"25-22",
"8-11",
"22-18",
"4-8",
"29-25",
"7-10",
"25-22",
"5-9",
"26-23",
"10-15",
"28-24",
"6-10",
"32-28",
"9-13",
"24-19",
"15x24",
"28x19",
"2-7",
"27-24",
"10-15",
"19x10",
"7x14",
"18x9",
"1-6",
"9x2",
"8-12",
"2x16",
"12x19,19x28",
"23-18",
"28-32",
"30-26",
"32x14",
"26-23",
"14x27",
"31x24"
]
};

const rc={
1:[0,1],2:[0,3],3:[0,5],4:[0,7],
5:[1,0],6:[1,2],7:[1,4],8:[1,6],
9:[2,1],10:[2,3],11:[2,5],12:[2,7],
13:[3,0],14:[3,2],15:[3,4],16:[3,6],
17:[4,1],18:[4,3],19:[4,5],20:[4,7],
21:[5,0],22:[5,2],23:[5,4],24:[5,6],
25:[6,1],26:[6,3],27:[6,5],28:[6,7],
29:[7,0],30:[7,2],31:[7,4],32:[7,6]
};

function drawBoard(id){
let board=document.getElementById(id);
board.innerHTML="";
let num=1;

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

let sq=document.createElement("div");
let dark=(r+c)%2==1;

sq.className="square "+(dark?"dark":"light");

if(dark){
sq.dataset.pos=num;

let n=document.createElement("div");
n.className="num";
n.innerText=num;

sq.appendChild(n);
num++;
}

board.appendChild(sq);
}
}
}

function getCapturedSquare(from,to){

let r1=rc[from][0];
let c1=rc[from][1];
let r2=rc[to][0];
let c2=rc[to][1];

let r=(r1+r2)/2;
let c=(c1+c2)/2;

for(let k in rc){
if(rc[k][0]==r && rc[k][1]==c){
return parseInt(k);
}
}

return null;
}

function getCapturedSquaresKing(from,to){

let r1=rc[from][0];
let c1=rc[from][1];

let r2=rc[to][0];
let c2=rc[to][1];

let dr=Math.sign(r2-r1);
let dc=Math.sign(c2-c1);

let captured=[];

let r=r1+dr;
let c=c1+dc;

while(r!=r2 && c!=c2){

for(let k in rc){
if(rc[k][0]==r && rc[k][1]==c){
captured.push(parseInt(k));
}
}

r+=dr;
c+=dc;
}

return captured;
}

function buildPosition(step){

let white=data.start.white.map(s=>({square:s,king:false}));
let black=data.start.black.map(s=>({square:s,king:false}));

for(let i=0;i<step;i++){

let move=data.moves[i];
let sequences=move.split(",");
let currentFrom=null;

for(let seq of sequences){

let capture=seq.includes("x");
let parts=seq.split(/[-x]/);

let from=currentFrom ?? parseInt(parts[0]);
let to=parseInt(parts[1]);

let arr=white.find(p=>p.square==from)?white:black;
let enemy=arr===white?black:white;

let piece=arr.find(p=>p.square==from);

piece.square=to;

if(arr===black && to<=4) piece.king=true;
if(arr===white && to>=29) piece.king=true;

if(capture){

if(piece.king){

let squares=getCapturedSquaresKing(from,to);

squares.forEach(s=>{
let idx=enemy.findIndex(p=>p.square==s);
if(idx>-1) enemy.splice(idx,1);
});

}else{

let eaten=getCapturedSquare(from,to);
let idx=enemy.findIndex(p=>p.square==eaten);

if(idx>-1) enemy.splice(idx,1);

}

}

currentFrom=to;

}

}

return[
...white.map(p=>({...p,color:"white"})),
...black.map(p=>({...p,color:"black"}))
];

}

function renderViewer(){

document.querySelectorAll("#bookBoard .piece").forEach(e=>e.remove());

let pos=buildPosition(step);

for(let p of pos){

let cell=document.querySelector(`#bookBoard [data-pos='${p.square}']`);

if(cell){

let piece=document.createElement("div");
piece.className="piece "+p.color;

if(p.king) piece.classList.add("king");

cell.appendChild(piece);

}

}

document.getElementById("moveInfo").innerText=
step>0?data.moves[step-1]:"Start position";
}

function next(){
if(step<data.moves.length){
step++;
renderViewer();
}
}

function prev(){
if(step>0){
step--;
renderViewer();
}
}

/* TRAINER */

let trainerPieces=[];
let selected=null;
let trainerStep=0;

function resetTrainer(){

trainerPieces=[
...data.start.white.map(s=>({square:s,color:"white"})),
...data.start.black.map(s=>({square:s,color:"black"}))
];

trainerStep=0;
selected=null;

renderTrainer();
}

function renderTrainer(){

document.querySelectorAll("#trainBoard .piece").forEach(e=>e.remove());

trainerPieces.forEach(p=>{

let cell=document.querySelector(`#trainBoard [data-pos='${p.square}']`);

let piece=document.createElement("div");
piece.className="piece "+p.color;

cell.appendChild(piece);

});
}

document.addEventListener("click",e=>{

let sq=e.target.closest("#trainBoard .square");
if(!sq) return;

let pos=parseInt(sq.dataset.pos);

let piece=trainerPieces.find(p=>p.square==pos);

if(piece){

selected=piece;

document.querySelectorAll("#trainBoard .square")
.forEach(s=>s.classList.remove("selected"));

sq.classList.add("selected");

return;
}

if(selected){

attemptMove(selected.square,pos);
}

});

function attemptMove(from,to){

let move=data.moves[trainerStep];
if(!move) return;

let clean=move.replace("x","-");
let [mFrom,mTo]=clean.split("-").map(Number);

if(from==mFrom && to==mTo){

let piece=trainerPieces.find(p=>p.square==from);
piece.square=to;

trainerStep++;

document.getElementById("status").innerText="Correct";

}else{

document.getElementById("status").innerText="Wrong move";

}

selected=null;

renderTrainer();
}

/* INIT */

drawBoard("bookBoard");
drawBoard("trainBoard");

renderViewer();
resetTrainer();

</script>
</body>
</html>
