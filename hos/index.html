<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Checkers Trainer</title>

<style>

html{
overscroll-behavior:none;
}

body{
padding-bottom:40px;
font-family:Arial;
text-align:center;
margin:0;
touch-action:manipulation;

overflow-y:auto;
overscroll-behavior:contain;
}

#board{
display:grid;
grid-template-columns:repeat(8,1fr);
width:95vw;
max-width:500px;
aspect-ratio:1/1;
margin:auto;
}

.square{position:relative}

.light{background:#f0d9b5}
.dark{background:#b58863}

.num{
position:absolute;
top:3px;
right:4px;
font-size:10px;
}

.piece{
width:70%;
height:70%;
border-radius:50%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.white{
background:white;
border:2px solid #333;
}

.black{
background:black;
}

.king::after{
content:"";
position:absolute;
width:60%;
height:60%;
border-radius:50%;
background:gold;
top:20%;
left:20%;
}

/* highlight move */
.lastMove{
outline:4px solid #4CAF50;
}

/* captured piece */
.captured{
outline:4px solid red;
}

/* slider */

#slider{
width:90%;
margin-top:10px;
}

textarea{
width:90%;
height:80px;
margin:5px;
}

button{
padding:8px 10px;
margin:3px;
}

</style>
</head>

<body>

<br>

<b>เลือกโหมด</b>

<label>
<input type="radio" name="mode" checked onclick="setPlayMode()">
ปกติ
</label>

<label>
<input type="radio" name="mode" onclick="setCustomMode()">
วางหมากเอง
</label>

<br><br>

<b>ทิศทาง</b>

<label>
<input type="radio" name="dir" checked onclick="setBottomFirst()">
ล่างเดินก่อน
</label>

<label>
<input type="radio" name="dir" onclick="setTopFirst()">
บนเดินก่อน
</label>

<br><br>

Place:

<button id="whiteBtn" onclick="placeColor='white'">White</button>
<button id="blackBtn" onclick="placeColor='black'">Black</button>
<button id="clearBoardBtn" onclick="clearBoard()">Clear Board</button>

<br><br>

<div id="board"></div>

<br>

<button id="prevBtn" onclick="prev()">Prev</button>
<button id="nextBtn" onclick="next()">Next</button>
<button id="playBtn" onclick="play()">Play</button>
<button id="stopBtn" onclick="stop()">Stop</button>
<button id="resetBtn" onclick="resetGame()">Reset</button>

<br>

<input id="slider" type="range" min="0" max="0" value="0" oninput="sliderMove(this.value)">

<br><br>

<b>Moves Input</b><br>

<textarea id="movesInput"></textarea>

<br>

<button id="runBtn" onclick="loadMoves()">Run</button>
<button onclick="continueMoves()">Continue</button>
<button onclick="clearMoves()">Clear</button>

<br><br>

<b>Timeline</b><br>

<textarea id="timeline" readonly></textarea>

<p id="moveInfo"></p>

<script>

document.addEventListener("dblclick",e=>e.preventDefault())

function setPlayButtons(enabled){

document.getElementById("prevBtn").disabled=!enabled
document.getElementById("nextBtn").disabled=!enabled
document.getElementById("playBtn").disabled=!enabled
document.getElementById("stopBtn").disabled=!enabled
document.getElementById("resetBtn").disabled=!enabled

}

function setCustomButtons(enabled){

document.getElementById("whiteBtn").disabled=!enabled
document.getElementById("blackBtn").disabled=!enabled
document.getElementById("clearBoardBtn").disabled=!enabled

}

let mode="play"
let timer=null
let step=0
let speed=1000
let placeColor="white"
let flip=false

let lastMoveSquares=[]
let capturedSquares=[]

let data={
start:{white:[],black:[]},
moves:[]
}

const rc={
1:[0,1],2:[0,3],3:[0,5],4:[0,7],
5:[1,0],6:[1,2],7:[1,4],8:[1,6],
9:[2,1],10:[2,3],11:[2,5],12:[2,7],
13:[3,0],14:[3,2],15:[3,4],16:[3,6],
17:[4,1],18:[4,3],19:[4,5],20:[4,7],
21:[5,0],22:[5,2],23:[5,4],24:[5,6],
25:[6,1],26:[6,3],27:[6,5],28:[6,7],
29:[7,0],30:[7,2],31:[7,4],32:[7,6]
}

function defaultPosition(){

data.start.white=[]
data.start.black=[]

for(let i=1;i<=8;i++)
data.start.white.push({square:i,king:false})

for(let i=25;i<=32;i++)
data.start.black.push({square:i,king:false})

}

function setBottomFirst(){ flip=false; resetGame() }
function setTopFirst(){ flip=true; resetGame() }

function setPlayMode(){ mode="play"; setCustomButtons(false) }

function setCustomMode(){

mode="custom"
stop()
step=0
setCustomButtons(true)
render()

}

function clearBoard(){

data.start.white=[]
data.start.black=[]
step=0
render()

}

function clearMoves(){

document.getElementById("movesInput").value=""
document.getElementById("timeline").value=""
data.moves=[]
setPlayButtons(false)
step=0
document.getElementById("runBtn").disabled=false
render()

}

function tapSquare(e){

if(mode!="custom") return

let pos=parseInt(e.currentTarget.dataset.pos)

let arr=data.start[placeColor]

let i=arr.findIndex(p=>p.square==pos)

if(i==-1) arr.push({square:pos,king:false})
else if(!arr[i].king) arr[i].king=true
else arr.splice(i,1)

render()

}

function drawBoard(){

const board=document.getElementById("board")
board.innerHTML=""

let numbers=[...Array(32).keys()].map(i=>i+1)
if(flip) numbers.reverse()

let index=0

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){

let sq=document.createElement("div")

let dark=(r+c)%2==1
sq.className="square "+(dark?"dark":"light")

if(dark){

let pos=numbers[index++]

sq.dataset.pos=pos
sq.onclick=tapSquare

let n=document.createElement("div")
n.className="num"
n.innerText=pos

sq.appendChild(n)

}

board.appendChild(sq)

}
}

}

function loadMoves(){

stop()

let txt=document.getElementById("movesInput").value

let newMoves=txt.split(/[\n,]+/)
.map(x=>x.trim())
.filter(x=>x)

data.moves=newMoves

document.getElementById("timeline").value=data.moves.join("\n")
document.getElementById("movesInput").value=""
document.getElementById("runBtn").disabled=true

document.getElementById("slider").max=data.moves.length

setPlayButtons(true)

step=0
render()

}

function continueMoves(){

stop()

let txt=document.getElementById("movesInput").value

let more=txt.split(/[\n,]+/)
.map(x=>x.trim())
.filter(x=>x)

/* ตัดสูตรหลัง step ปัจจุบันทิ้ง */
data.moves=data.moves.slice(0,step)

/* ต่อสูตรใหม่ */
data.moves=data.moves.concat(more)

document.getElementById("timeline").value=data.moves.join("\n")

document.getElementById("movesInput").value=""

document.getElementById("slider").max=data.moves.length

render()

}

function sliderMove(v){

step=parseInt(v)
render()

}

function play(){

if(timer) return

timer=setInterval(()=>{

if(step<data.moves.length){
step++
render()
}else stop()

},speed)

}

function stop(){ clearInterval(timer); timer=null }

function resetGame(){ stop(); step=0; drawBoard(); render() }

function next(){ if(step<data.moves.length){ step++; render() } }

function prev(){ if(step>0){ step--; render() } }

function getCapturedSquares(from,to){

let r1=rc[from][0]
let c1=rc[from][1]
let r2=rc[to][0]
let c2=rc[to][1]

let dr=Math.sign(r2-r1)
let dc=Math.sign(c2-c1)

let r=r1+dr
let c=c1+dc

let squares=[]

while(r!=r2 && c!=c2){

for(let k in rc){
if(rc[k][0]==r && rc[k][1]==c)
squares.push(parseInt(k))
}

r+=dr
c+=dc

}

return squares

}

function promote(piece){

let r=rc[piece.square][0]

if(piece.color=="black" && r==0) piece.king=true
if(piece.color=="white" && r==7) piece.king=true

}

function buildPosition(step){

let white=data.start.white.map(p=>({...p,color:"white"}))
let black=data.start.black.map(p=>({...p,color:"black"}))

lastMoveSquares=[]
capturedSquares=[]

for(let i=0;i<step;i++){

let move=data.moves[i]

let parts=move.split(/[-x]/)

let from=parseInt(parts[0])
let to=parseInt(parts[1])

let arr=white.find(p=>p.square==from)?white:black
let enemy=arr===white?black:white

let piece=arr.find(p=>p.square==from)
if(!piece) continue

piece.square=to

if(i==step-1) lastMoveSquares=[from,to]

if(move.includes("x")){

let squares=getCapturedSquares(from,to)

squares.forEach(s=>{

let idx=enemy.findIndex(p=>p.square==s)

if(idx>-1){
if(i==step-1) capturedSquares.push(s)
enemy.splice(idx,1)
}

})

}

promote(piece)

}

return [...white,...black]

}

function render(){

document.querySelectorAll(".piece").forEach(e=>e.remove())
document.querySelectorAll(".square").forEach(e=>e.classList.remove("lastMove","captured"))

let pos=buildPosition(step)

lastMoveSquares.forEach(s=>{
let cell=document.querySelector(`[data-pos='${s}']`)
if(cell) cell.classList.add("lastMove")
})

capturedSquares.forEach(s=>{
let cell=document.querySelector(`[data-pos='${s}']`)
if(cell) cell.classList.add("captured")
})

pos.forEach(p=>{

let cell=document.querySelector(`[data-pos='${p.square}']`)

if(cell){

let piece=document.createElement("div")
piece.className="piece "+p.color

if(p.king) piece.classList.add("king")

cell.appendChild(piece)

}

})

document.getElementById("moveInfo").innerText=
step>0?data.moves[step-1]:"Start Position"

document.getElementById("slider").value=step

}

defaultPosition()
drawBoard()

setPlayButtons(false)
setCustomButtons(false)

render()

</script>

</body>
</html>
